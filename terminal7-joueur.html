// UTILITAIRES
// ══════════════════════════════════════════════════════
function norm(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}
function fmt(s) {
  s = Math.max(0, s);
  return String(Math.floor(s/3600)).padStart(2,"0") + ":" +
         String(Math.floor((s%3600)/60)).padStart(2,"0") + ":" +
         String(s%60).padStart(2,"0");
}
function pause(ms) { return new Promise(r => setTimeout(r, ms)); }

function ligne(txt, cls="info") {
  const d = document.createElement("div");
  d.className = "line " + cls;
  d.textContent = txt;
  OUTPUT.appendChild(d);
  OUTPUT.scrollTop = OUTPUT.scrollHeight;
  return d;
}
function sep() { ligne("─".repeat(44), "sep"); }

function typing(txt, cls="info", v=22) {
  return new Promise(resolve => {
    const d = document.createElement("div");
    d.className = "line " + cls;
    d.textContent = "";
    OUTPUT.appendChild(d);
    OUTPUT.scrollTop = OUTPUT.scrollHeight;
    if (!txt) { resolve(); return; }
    let i = 0;
    const iv = setInterval(() => {
      d.textContent += txt[i++];
      OUTPUT.scrollTop = OUTPUT.scrollHeight;
      if (i >= txt.length) { clearInterval(iv); resolve(); }
    }, v);
  });
}
async function seq(lignes, cls="info") {
  for (const l of lignes) { await typing(l, cls); await pause(45); }
}
async function seqML(txt, cls="info") {
  for (const l of txt.split("\n")) { await typing(l, cls); await pause(45); }
}
async function analyse() {
  const d = ligne("Analyse en cours...", "system");
  await pause(700); d.remove();
}
function setPrompt(txt, type="text", placeholder="") {
  PROMPT_EL.textContent = txt;
  INPUT_EL.type = type;
  INPUT_EL.placeholder = placeholder;
  setTimeout(() => INPUT_EL.focus(), 100);
}

// ══════════════════════════════════════════════════════
// CHRONOMÈTRE — basé sur l'heure de démarrage Firebase
// Le temps réel = (maintenant - startedAt) + penaliteSecondes
// Même déconnecté, le chrono continue de tourner.
// ══════════════════════════════════════════════════════
let chronoStartedAt    = null;  // Date.now() au moment du démarrage
let chronoPenalites    = 0;     // secondes de pénalités cumulées

function secondesEcoulees() {
  if (!chronoStartedAt) return chronoPenalites;
  return Math.floor((Date.now() - chronoStartedAt) / 1000) + chronoPenalites;
}

function majChrono() {
  secondes = secondesEcoulees();
  document.getElementById("cd-display").textContent = fmt(secondes);
}

function demarrerChrono() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    majChrono();
    // Sauvegarde toutes les 15s (on sauvegarde penalites + startedAt, pas le temps calculé)
    if (Math.floor((Date.now() - chronoStartedAt) / 1000) % 15 === 0) {
      sauvegarderTemps();
    }
  }, 1000);
}

function stopChrono() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function ajouterPenalite(minutes) {
  chronoPenalites += minutes * 60;
  majChrono();
  const w = document.getElementById("countdown");
  w.classList.add("penalite");
  setTimeout(() => w.classList.remove("penalite"), 1000);
  // Sauvegarde immédiate des pénalités
  sauvegarderTemps();
}

function sauvegarderTemps() {
  if (!joueurId || !sessionId) return;
  update(ref(db, `joueurs/${sessionId}/${joueurId}`), {
    chronoStartedAt: chronoStartedAt,
    chronoPenalites: chronoPenalites,
    tempsSecondes:   secondesEcoulees(), // pour l'affichage admin
  }).catch(() => {});
}

// Démarre le chrono pour un nouveau joueur
function initChronoNouveauJoueur() {
  chronoStartedAt = Date.now();
  chronoPenalites = 0;
}

// Restaure le chrono depuis Firebase (reconnexion)
function restaurerChrono(data) {
  chronoStartedAt = data.chronoStartedAt || Date.now();
  chronoPenalites = data.chronoPenalites || 0;
}

// ══════════════════════════════════════════════════════
// PROGRESSION
// ══════════════════════════════════════════════════════
function majProgression() {
  const bar = document.getElementById("progress-bar");
  while (bar.children.length > 1) bar.removeChild(bar.lastChild);
  ENIGMES.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "step-dot" + (i < enigmeIdx ? " done" : i === enigmeIdx ? " current" : "");
    bar.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════
// FIREBASE — CHARGEMENT
// ══════════════════════════════════════════════════════
async function chargerConfig() {
  const snap = await get(ref(db, "config"));
  if (!snap.exists()) throw new Error("Config introuvable. Vérifiez Firebase.");
  CONFIG = snap.val();
  sessionId = CONFIG.sessionId;

  const snapE = await get(ref(db, "enigmes"));
  if (!snapE.exists()) throw new Error("Énigmes introuvables. Vérifiez Firebase.");
  const raw = snapE.val();
  ENIGMES = Array.isArray(raw) ? raw : Object.values(raw);
}

// ══════════════════════════════════════════════════════
// ÉCOUTE RESET EN TEMPS RÉEL
// ══════════════════════════════════════════════════════
function ecouterReset() {
  onValue(ref(db, "config/sessionId"), snap => {
    const newSession = snap.val();
    if (newSession && newSession !== sessionId && phase !== "saisie-prenom") {
      stopChrono();
      phase = "reset";
      OUTPUT.innerHTML = "";
      sep();
      seq([
        "⚠ SYSTÈME RÉINITIALISÉ PAR L'ADMINISTRATEUR.",
        "Votre session a été terminée.",
        "Rechargez la page pour une nouvelle partie.",
      ], "error");
      sep();
      document.getElementById("input-area").style.display = "none";
    }
  });
}

}

// ══════════════════════════════════════════════════════
// PHASE 2 — CRÉATION OU RECONNEXION
// ══════════════════════════════════════════════════════
async function traiterPrenom(saisie) {
  if (saisie.length < 2) {
    ligne("⚠ Prénom trop court.", "error");
    return;
  }
  enAttente = true;
  ligne(`PRÉNOM > ${saisie}`, "input");
  prenom   = saisie.trim();
  joueurId = norm(prenom).replace(/\s+/g, "_");

  await analyse();

  // Chercher si le joueur existe déjà dans la session courante
  const snap = await get(ref(db, `joueurs/${sessionId}/${joueurId}`));

  if (snap.exists()) {
    const data = snap.val();

    // Vérifier si une session est déjà active sur un autre appareil
    if (data.sessionActive) {
      ligne("", "info");
      await seq([
        `⚠ Le prénom « ${prenom} » est déjà connecté sur un autre appareil.`,
        "Si c'est vous, entrez votre mot de passe pour reprendre.",
        "Sinon, choisissez un autre prénom.",
      ], "warning");
      ligne("", "info");
      // On lui propose quand même de se connecter avec son mot de passe
      // car c'est peut-être lui qui s'est déconnecté sans fermer l'autre onglet
      await typing("Entrez votre mot de passe pour reprendre votre session.", "info");
      ligne("", "info");
      setPrompt("MOT DE PASSE >", "password", "Votre mot de passe…");
      phase = "saisie-mdp-reconnexion";
    } else {
      // Joueur connu, pas de session active → reconnexion normale
      ligne("", "info");
      await typing(`Identifiant « ${prenom} » reconnu.`, "success");
      await typing("Entrez votre mot de passe personnel pour reprendre.", "info");
      ligne("", "info");
      setPrompt("MOT DE PASSE >", "password", "Votre mot de passe…");
      phase = "saisie-mdp-reconnexion";
    }
  } else {
    // Nouveau joueur — vérifier que ce prénom n'est pas déjà pris
    // (cas où quelqu'un d'autre utilise ce prénom dans la session)
    const tousSnap = await get(ref(db, `joueurs/${sessionId}`));
    if (tousSnap.exists()) {
      const tous = tousSnap.val();
      const prenomPris = Object.values(tous).some(
        j => norm(j.prenom || "") === norm(prenom)
      );
      if (prenomPris) {
        ligne("", "info");
        await seq([
          `⚠ Le prénom « ${prenom} » est déjà utilisé par un autre joueur.`,
          "Choisissez un prénom différent.",
        ], "error");
        ligne("", "info");
        setPrompt("PRÉNOM >", "text", "Votre prénom…");
        phase = "saisie-prenom";
        enAttente = false;
        return;
      }
    }
    // Prénom disponible → création
    ligne("", "info");
    await typing(`Bienvenue, ${prenom}.`, "success");
    await typing("Créez un mot de passe personnel (minimum 3 caractères).", "info");
    await typing("Vous en aurez besoin si vous vous déconnectez.", "system");
    ligne("", "info");
    setPrompt("NOUVEAU MOT DE PASSE >", "password", "Choisissez un mot de passe…");
    phase = "saisie-mdp-nouveau";
  }
  enAttente = false;
}

// ══════════════════════════════════════════════════════
// PHASE 3a — CRÉATION MOT DE PASSE (nouveau joueur)
// ══════════════════════════════════════════════════════
async function traiterNouveauMdp(saisie) {
  if (saisie.length < 3) {
    ligne("⚠ Mot de passe trop court (3 caractères minimum).", "error");
    return;
  }
  enAttente = true;
  ligne("NOUVEAU MOT DE PASSE > " + "•".repeat(saisie.length), "input");
  mdpTemp = saisie;

  await typing("Confirmez votre mot de passe.", "info");
  ligne("", "info");
  setPrompt("CONFIRMATION >", "password", "Répétez votre mot de passe…");
  phase = "saisie-mdp-confirm";
  enAttente = false;
}

// ══════════════════════════════════════════════════════
// PHASE 3b — CONFIRMATION MOT DE PASSE
// ══════════════════════════════════════════════════════
async function traiterConfirmMdp(saisie) {
  enAttente = true;
  ligne("CONFIRMATION > " + "•".repeat(saisie.length), "input");

  if (saisie !== mdpTemp) {
    ligne("", "info");
    await seq(["⚠ Les mots de passe ne correspondent pas.", "Recommencez."], "error");
    ligne("", "info");
    mdpTemp = "";
    await typing("Créez un mot de passe personnel (minimum 3 caractères).", "info");
    ligne("", "info");
    setPrompt("NOUVEAU MOT DE PASSE >", "password", "Choisissez un mot de passe…");
    phase = "saisie-mdp-nouveau";
    enAttente = false;
    return;
  }

  // Mot de passe confirmé → créer le joueur dans Firebase
  mdpJoueur = mdpTemp;
  mdpTemp   = "";

  await analyse();

  try {
    await set(ref(db, `joueurs/${sessionId}/${joueurId}`), {
      prenom,
      joueurId,
      mdpHash:         btoa(mdpJoueur),
      mdpClair:        mdpJoueur,
      enigmeIdx:       0,
      indiceIdx:       0,
      tempsSecondes:   0,
      chronoStartedAt: null,
      chronoPenalites: 0,
      fini:            false,
      sessionActive:   true,
      sessionId,
      connecteAt:      Date.now(),
    });
    enigmeIdx = 0;
    indiceIdx = 0;
    secondes  = 0;

    ligne("", "info");
    await seq([
      "Mot de passe enregistré.",
      `Identité créée : ${prenom.toUpperCase()}`,
    ], "success");
    await pause(300);
    sep();
    // → Demander le code de session
    await phaseCodeSession();
  } catch(e) {
    ligne("⚠ Erreur Firebase : " + e.message, "error");
    enAttente = false;
  }
}

// ══════════════════════════════════════════════════════
// PHASE 3c — RECONNEXION (joueur existant)
// ══════════════════════════════════════════════════════
async function traiterReconnexionMdp(saisie) {
  enAttente = true;
  ligne("MOT DE PASSE > " + "•".repeat(saisie.length), "input");
  await analyse();

  const snap = await get(ref(db, `joueurs/${sessionId}/${joueurId}`));
  if (!snap.exists()) {
    ligne("⚠ Joueur introuvable. Rechargez la page.", "error");
    enAttente = false;
    return;
  }

  const data = snap.val();
  // Vérification du mot de passe (comparaison base64)
  if (btoa(saisie) !== data.mdpHash) {
    ligne("", "info");
    await seq(["⚠ MOT DE PASSE INCORRECT.", "Réessayez."], "error");
    ligne("", "info");
    setPrompt("MOT DE PASSE >", "password", "Votre mot de passe…");
    enAttente = false;
    return;
  }

  // Mot de passe OK → reprendre la progression
  mdpJoueur     = saisie;
  enigmeIdx     = data.enigmeIdx  || 0;
  indiceIdx     = data.indiceIdx  || 0;
  codeSessionOk = data.codeSessionOk || false;

  // Restaurer le chrono depuis Firebase (continue de tourner même déconnecté)
  restaurerChrono(data);
  secondes = secondesEcoulees();

  // Charger les notes sauvegardées
  if (data.notes) chargerNotes(data.notes);

  // Marquer la session comme active
  await update(ref(db, `joueurs/${sessionId}/${joueurId}`), { sessionActive: true });

  ligne("", "info");
  await seq([
    "Authentification réussie.",
    `Bon retour, ${prenom.toUpperCase()}.`,
  ], "success");
  await pause(300);
  sep();

  // Si le joueur n'a pas encore validé le code de session → le demander
  if (!codeSessionOk) {
    await phaseCodeSession();
  } else {
    await typing(`Reprise à l'énigme ${enigmeIdx + 1} — Chrono : ${fmt(secondes)}`, "system");
    await pause(400);
    sep();
    await lancerJeu();
  }
}

// ══════════════════════════════════════════════════════
// PHASE 4 — CODE DE SESSION (1ère épreuve)
// ══════════════════════════════════════════════════════
async function phaseCodeSession() {
  phase = "saisie-code-session";
  enAttente = true;

  await typing("ACCÈS RESTREINT — NIVEAU 1", "warning", 22);
  sep();
  await pause(200);
  await seq([
    "Un code d'accès est requis pour pénétrer ce système.",
    "Ce code vous a été communiqué par votre superviseur.",
    "",
  ], "info");

  setPrompt("CODE D'ACCÈS >", "password", "Entrez le code…");
  enAttente = false;
}

async function traiterCodeSession(saisie) {
  enAttente = true;
  ligne("CODE D'ACCÈS > " + "•".repeat(saisie.length), "input");
  await analyse();

  if (norm(saisie) !== norm(CONFIG.motDePasse)) {
    ligne("", "info");
    await seq([
      "⚠ CODE INVALIDE.",
      "Accès refusé. Réessayez.",
    ], "error");
    ligne("", "info");
    setPrompt("CODE D'ACCÈS >", "password", "Entrez le code…");
    enAttente = false;
    return;
  }

  // Code correct → marquer dans Firebase et lancer le jeu
  codeSessionOk = true;
  await update(ref(db, `joueurs/${sessionId}/${joueurId}`), {
    codeSessionOk: true,
  });

  ligne("", "info");
  await seq([
    "✓ CODE ACCEPTÉ.",
    "Accès au système autorisé.",
    "Initialisation en cours...",
  ], "success");
  await pause(400);
  sep();
  await lancerJeu();
}

// ══════════════════════════════════════════════════════
// JEU
// ══════════════════════════════════════════════════════
async function lancerJeu() {
  phase = "jeu";
  enAttente = true;
  majProgression();

  // Démarrer le chrono seulement si pas encore commencé
  if (!chronoStartedAt) {
    initChronoNouveauJoueur();
    // Sauvegarder le startedAt dans Firebase immédiatement
    await update(ref(db, `joueurs/${sessionId}/${joueurId}`), {
      chronoStartedAt: chronoStartedAt,
      chronoPenalites: 0,
    });
  }

  majChrono();
  demarrerChrono();
  ecouterReset();

  await seq([
    "",
    "Initialisation du protocole de sécurité...",
    "Vérification de l'intégrité des données... OK",
    `${ENIGMES.length} énigmes détectées dans le système.`,
    "",
  ], "system");

  sep();
  await seq([
    "INSTRUCTIONS :",
    "  → Tapez votre réponse pour résoudre une énigme.",
    "  → HELP    : demander un indice  (+3 min)",
    "  → STATUS  : afficher votre progression",
    "",
    "⚠ Chaque mauvaise réponse ajoute 2 min au chrono.",
    "⚠ Chaque indice ajoute 3 min au chrono.",
  ], "info");
  sep();

  setPrompt("ROOT@T7 >", "text", "Entrez votre réponse…");

  await pause(300);
  if (enigmeIdx >= ENIGMES.length) {
    await afficherVictoire();
  } else {
    await afficherEnigme();
  }
  enAttente = false;
}

async function afficherEnigme() {
  const e = ENIGMES[enigmeIdx];
  ligne("", "info");
  await typing(`[ ${e.titre} ]`, "warning", 20);
  ligne("", "info");
  await seqML(e.intro, "info");
  ligne("", "info");
  sep();
}

// ══════════════════════════════════════════════════════
// TRAITEMENT SAISIE EN JEU
// ══════════════════════════════════════════════════════
async function traiterSaisieJeu(saisie) {
  enAttente = true;
  ligne(`ROOT@T7 > ${saisie}`, "input");
  const cmd = norm(saisie);

  if (cmd === "status") {
    ligne("", "info");
    ligne(`Joueur      : ${prenom.toUpperCase()}`, "system");
    ligne(`Énigme      : ${enigmeIdx + 1} / ${ENIGMES.length}`, "system");
    ligne(`Chrono      : ${fmt(secondes)}`, "system");
    ligne(`Indices     : ${indiceIdx} utilisé(s)`, "system");
    ligne("", "info");
    enAttente = false;
    return;
  }

  if (cmd === "help" || cmd === "aide" || cmd === "indice") {
    await donnerIndice();
    enAttente = false;
    return;
  }

  await verifierReponse(cmd);
  enAttente = false;
}

async function verifierReponse(cmd) {
  const e = ENIGMES[enigmeIdx];
  await analyse();

  const reponses = Array.isArray(e.reponses) ? e.reponses : Object.values(e.reponses);
  const ok = reponses.some(r => norm(r) === cmd);

  if (ok) {
    ligne("", "info");
    await seqML(e.victoire, "success");
    ligne("", "info");
    enigmeIdx++;
    indiceIdx = 0;
    majProgression();

    await update(ref(db, `joueurs/${sessionId}/${joueurId}`), {
      enigmeIdx,
      indiceIdx,
      tempsSecondes: secondes,
    });

    if (enigmeIdx >= ENIGMES.length) {
      await afficherVictoire();
    } else {
      await pause(400);
      await afficherEnigme();
    }
  } else {
    ajouterPenalite(2);
    ligne("", "info");
    await seq([
      "⚠ ACCÈS REFUSÉ.",
      e.echec,
      "⏱ +2 MINUTES ajoutées au chronomètre.",
    ], "error");
    ligne("", "info");
    await typing("Tapez HELP pour obtenir un indice.", "system");
    ligne("", "info");
    await update(ref(db, `joueurs/${sessionId}/${joueurId}`), { tempsSecondes: secondes });
  }
}

async function donnerIndice() {
  const e = ENIGMES[enigmeIdx];
  const indices = [e.indice1, e.indice2, e.indice3].filter(Boolean);

  if (indiceIdx >= indices.length) {
    await seq([
      "Aucun indice supplémentaire disponible.",
      "Analysez attentivement les données précédentes.",
    ], "warning");
    return;
  }

  ajouterPenalite(3);
  ligne("", "info");
  await typing(`[ INDICE NIVEAU ${indiceIdx + 1} ]  ⏱ +3 MIN`, "warning", 25);
  await pause(200);
  await typing(indices[indiceIdx], "info");
  ligne("", "info");
  indiceIdx++;

  await update(ref(db, `joueurs/${sessionId}/${joueurId}`), {
    indiceIdx,
    tempsSecondes: secondes,
  });
}

// ══════════════════════════════════════════════════════
// VICTOIRE
// ══════════════════════════════════════════════════════
async function afficherVictoire() {
  stopChrono();
  phase = "fini";

  const tempsFinal = secondes;
  await update(ref(db, `joueurs/${sessionId}/${joueurId}`), {
    fini: true,
    tempsSecondes: tempsFinal,
    enigmeIdx,
    finAt: Date.now(),
  });
  await set(ref(db, `classement/${sessionId}/${joueurId}`), {
    prenom,
    tempsSecondes: tempsFinal,
    indicesUtilises: indiceIdx,
    finAt: Date.now(),
  });

  document.getElementById("final-temps").textContent   = fmt(tempsFinal);
  document.getElementById("final-indices").textContent = indiceIdx + " indice(s) utilisé(s)";
  document.getElementById("final-code").textContent    = CONFIG.codeVictoire || "OMEGA-7-LIBRE";
  document.getElementById("vic-sub-text").innerHTML    =
    (CONFIG.msgVictoire || "Félicitations !").replace(/\n/g,"<br>");
  document.getElementById("victory").classList.add("show");
}

// ══════════════════════════════════════════════════════
// ROUTEUR PRINCIPAL DES SAISIES
// ══════════════════════════════════════════════════════
async function traiterSaisie(saisie) {
  if (enAttente) return;
  saisie = saisie.trim();
  if (!saisie) return;

  switch(phase) {
    case "saisie-prenom":          await traiterPrenom(saisie);         break;
    case "saisie-mdp-nouveau":     await traiterNouveauMdp(saisie);     break;
    case "saisie-mdp-confirm":     await traiterConfirmMdp(saisie);     break;
    case "saisie-mdp-reconnexion": await traiterReconnexionMdp(saisie); break;
    case "saisie-code-session":    await traiterCodeSession(saisie);    break;
    case "jeu":                    await traiterSaisieJeu(saisie);       break;
  }
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", async () => {
  OUTPUT    = document.getElementById("output");
  INPUT_EL  = document.getElementById("input");
  PROMPT_EL = document.getElementById("prompt");

  // Horloge
  setInterval(() => {
    const n = new Date();
    document.getElementById("clock").textContent =
      String(n.getHours()).padStart(2,"0") + ":" +
      String(n.getMinutes()).padStart(2,"0") + ":" +
      String(n.getSeconds()).padStart(2,"0");
  }, 1000);

  // Saisie
  document.getElementById("send-btn").addEventListener("click", () => {
    const v = INPUT_EL.value; INPUT_EL.value = ""; traiterSaisie(v);
  });
  INPUT_EL.addEventListener("keydown", e => {
    if (e.key === "Enter") { const v = INPUT_EL.value; INPUT_EL.value = ""; traiterSaisie(v); }
  });
  document.addEventListener("click", () => {
    if (phase !== "fini" && phase !== "reset") INPUT_EL.focus();
  });

  // Marquer sessionActive = false quand le joueur ferme/quitte la page
  window.addEventListener("beforeunload", () => {
    if (joueurId && sessionId) {
      const url = `https://terminal-7-8d201-default-rtdb.europe-west1.firebasedatabase.app/joueurs/${sessionId}/${joueurId}/sessionActive.json`;
      navigator.sendBeacon(url, JSON.stringify(false));
    }
  });

  // Charger config Firebase puis démarrer
  try {
    await chargerConfig();
    await phaseLogin();
  } catch(err) {
    ligne("⚠ ERREUR : " + err.message, "error");
    ligne("Vérifiez votre connexion et la configuration Firebase.", "error");
  }
});
</script>

<script>
// ══════════════════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════════════════
let notesTimer = null;

function ouvrirNotes() {
  document.getElementById("notes-panel").classList.add("open");
  document.getElementById("notes-textarea").focus();
}

function fermerNotes() {
  document.getElementById("notes-panel").classList.remove("open");
  // Remettre le focus sur l'input principal
  setTimeout(() => {
    if (phase !== "fini" && phase !== "reset") INPUT_EL.focus();
  }, 100);
}

function onNotesInput() {
  // Indicateur "en cours de saisie"
  const status = document.getElementById("notes-status");
  status.textContent = "…";
  status.className = "saving";

  // Marquer le bouton si des notes existent
  const hasContent = document.getElementById("notes-textarea").value.trim().length > 0;
  document.getElementById("notes-btn").classList.toggle("has-notes", hasContent);

  // Sauvegarde différée (2s après la dernière frappe)
  clearTimeout(notesTimer);
  notesTimer = setTimeout(() => sauvegarderNotes(), 2000);
}

async function sauvegarderNotes() {
  if (!joueurId || !sessionId) return;
  const texte = document.getElementById("notes-textarea").value;
  const status = document.getElementById("notes-status");
  try {
    await update(ref(db, `joueurs/${sessionId}/${joueurId}`), { notes: texte });
    status.textContent = "✓ SAUVEGARDÉ";
    status.className = "saved";
    setTimeout(() => { status.textContent = "—"; status.className = ""; }, 2500);
  } catch(e) {
    status.textContent = "⚠ ERREUR";
    status.className = "";
  }
}

async function effacerNotes() {
  if (!confirm("Effacer toutes vos notes ?")) return;
  document.getElementById("notes-textarea").value = "";
  document.getElementById("notes-btn").classList.remove("has-notes");
  await sauvegarderNotes();
}

function chargerNotes(texte) {
  if (!texte) return;
  document.getElementById("notes-textarea").value = texte;
  document.getElementById("notes-btn").classList.add("has-notes");
}

// Exposer les fonctions au HTML
window.ouvrirNotes  = ouvrirNotes;
window.fermerNotes  = fermerNotes;
window.onNotesInput = onNotesInput;
window.effacerNotes = effacerNotes;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if (isIOS && !isStandalone) {
  setTimeout(() => document.getElementById("pwa-banner").classList.add("show"), 3000);
}
// Mettre à jour le prénom dans l'overlay victoire
document.addEventListener("victoire-joueur", e => {
  document.getElementById("final-prenom").textContent = e.detail?.toUpperCase() || "";
});
</script>
</body>
</html>
